name: Attest release assets

# Generates GitHub Artifact Attestations (SLSA build provenance) for the
# release assets so users can cryptographically verify they were produced
# from this repository. Runs when a release is published, and can be run
# manually to attest an already-published release (e.g. an existing tag).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attest (e.g. 1.1.9)"
        required: true
        type: string

permissions:
  contents: read # download the release assets
  id-token: write # request the OIDC token used to sign the attestation
  attestations: write # write the attestation to the repository

jobs:
  attest:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: rel
        run: echo "tag=${{ github.event.release.tag_name || inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "${{ steps.rel.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern main.js \
            --pattern styles.css \
            --dir dist

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/main.js
            dist/styles.css
