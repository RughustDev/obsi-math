  .node.dashed { border-style: dashed; }
  .nhead { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; padding-right: 52px; }

  .nfiles { display: flex; flex-wrap: wrap; gap: 4px 5px; margin-top: 8px; }

    font-family: Consolas, ui-monospace, "Cascadia Mono", monospace; font-size: 10.3px; line-height: 1;

  .chip.dim { opacity: 0.55; }
  .ring {
    position: absolute; top: 10px; right: 12px; font-family: Consolas, ui-monospace, monospace;
    font-size: 9px; letter-spacing: 1px; text-transform: uppercase; padding: 3px 6px; border-radius: 4px;

  }
  .grouplabel {
    position: absolute; font-family: Consolas, ui-monospace, monospace; font-size: 11px; letter-spacing: 2.5px;
    text-transform: uppercase; color: #6d78a0; background: #0b0f1c; padding: 2px 10px;
  }
  .code { font-family: Consolas, ui-monospace, "Cascadia Mono", monospace; font-size: 10.6px; line-height: 1.55;
    background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 9px 11px; margin-top: 9px; color: #9fb0d8; }
  .code .fence { color: #f09b52; }
  .code .k { color: #5aa7f0; }

  .minigrid { display: flex; gap: 8px; margin-top: 10px; }
  .mini { flex: 1 1 0; border: 1px solid; border-radius: 9px; padding: 9px 10px 10px; }

  .elabel {
    position: absolute; transform: translate(-50%, -50%); white-space: nowrap;

  function minigrid(items){
    return `<div class="minigrid">` + items.map(([g,t,f,d,c]) =>
      `<div class="mini" style="border-color:${hexa(PAL[c],0.4)};background:${hexa(PAL[c],0.05)}">
        <div class="mt" style="color:${PAL[c]}"><span class="g">${g}</span>${t}</div>
        <div class="mf">${f}</div><div class="md">${d}</div></div>`).join("") + `</div>`;
  }
  function legendHtml(){
    const rows = [
      ["blue","Obsidian — host and output"],
      ["orange","user input"],
      ["amber","data contracts: ObjetoMatematico · Geometria"],
      ["teal","processing: parsing, fields, root code"],
      ["green","engine core: scene, providers, tracers"],
      ["red","analysis · legacy fallback (dashed border)"],
      ["violet","rendering, interaction, and composition roots"],
      ["grey","Ring 0 contracts, config, assets, and tests"]
    ];
    return rows.map(([c,t]) =>
      `<div class="lgrow"><span class="lgdot" style="background:${hexa(PAL[c],0.25)};border:1.5px solid ${PAL[c]}"></span>${t}</div>`).join("");
  }
  function hexa(hex,a){
    const n = parseInt(hex.slice(1),16);
    return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
  }

    const d = document.createElement("div");
    d.className = "node" + (n.dashed ? " dashed" : "");
    d.id = n.id;
    d.style.cssText = `left:${n.x}px;top:${n.y}px;width:${n.w}px;`+

      `box-shadow:0 0 22px ${hexa(col,0.07)}, inset 0 1px 0 rgba(255,255,255,0.05);`;
    let h = "";
    if (n.title){
      h += `<div class="nhead">`;
      if (n.icon) h += `<div class="nicon" style="background:${hexa(col,0.16)};color:${col};border:1px solid ${hexa(col,0.35)}">${n.icon}</div>`;
      h += `<div><div class="ntitle" style="color:${hexa(col,1)}">${n.title}</div>`;
      if (n.path) h += `<div class="npath">${n.path}</div>`;
      h += `</div></div>`;
    }
    if (n.ring) h += `<div class="ring">${n.ring}</div>`;
    if (n.desc) h += `<div class="ndesc">${n.desc}</div>`;
    if (n.files) h += `<div class="nfiles">` + n.files.map(f=>`<span class="chip" style="color:${hexa(col,0.9)}">${f}</span>`).join("") + `</div>`;
    if (n.html) h += n.html;
    d.innerHTML = h;
    canvas.appendChild(d);

  // ---------- aristas ----------
  function anchor(id, side, off){
    const el = document.getElementById(id);
    const x = el.offsetLeft, y = el.offsetTop, w = el.offsetWidth, h = el.offsetHeight;
    off = off || 0;
    if (side === "t") return { x: x + w/2 + off, y: y };
    if (side === "b") return { x: x + w/2 + off, y: y + h };
    if (side === "l") return { x: x, y: y + h/2 + off };
    return { x: x + w, y: y + h/2 + off };
  }
